name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

env:
  PROJECT_ID: mindbridge-469901
  SERVICE_NAME: mindbridge-bot
  REGION: us-central1
  IMAGE_NAME: gcr.io/mindbridge-469901/mindbridge-bot

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Install uv
      uses: astral-sh/setup-uv@v3

    - name: Install dependencies
      run: uv sync

    - name: Run lints
      run: |
        uv run ruff check src/ --output-format=github
        uv run ruff format --check src/

    - name: Run type checking
      run: uv run mypy src/

    - name: Run tests
      run: uv run pytest --cov=src/ --cov-report=xml

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
      continue-on-error: true

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && false  # Disable deploy for now
    
    steps:
    - name: Deployment disabled
      run: |
        echo "🚧 Deployment is currently disabled"
        echo "✅ CI tests passed successfully"
        echo "📦 Ready for manual deployment if needed"
